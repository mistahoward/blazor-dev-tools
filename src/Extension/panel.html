<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blazor DevTools</title>
    <link rel="stylesheet" href="panel.css" />
  </head>
  <body>
    <header class="panel-header">
      <h1>Blazor Dev Tools</h1>
      <p class="panel-subtitle">Component inspection panel (scaffolding)</p>
    </header>
    <main class="panel-main">
      <section class="component-tree" aria-label="Blazor component tree">
        <h2>Component Tree</h2>
        <p class="placeholder">No components detected yet.</p>
      </section>
    </main>
    <script type="module" src="dist/scripts/panel.js"></script>
  </body>
</html>
